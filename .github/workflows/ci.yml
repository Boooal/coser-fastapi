name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: coser_user
          POSTGRES_PASSWORD: coser_pass
          POSTGRES_DB: coser_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DB_URL: postgresql+asyncpg://coser_user:coser_pass@localhost:5432/coser_test
      DB_URL: postgresql+asyncpg://coser_user:coser_pass@localhost:5432/coser_test
      JWT_SECRET_KEY: test-secret-only

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - run: uv sync --frozen

      - run: uv run ruff check .

      - run: uv run pytest -v